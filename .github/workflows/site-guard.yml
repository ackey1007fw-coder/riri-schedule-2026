name: Site Identity Guard

# 2サイト取り違え防止。
# main = 夏凪里季 / yukako/main = 吉井優花子。
# 対象ブランチに別サイトの内容が入っていたら CI を失敗させて検知する。
# （2サイトは同一リポジトリ ackey1007fw-coder/riri-schedule-2026 のブランチ違い。
#  リポジトリ名では区別できないため、profile.ts の中身で判定する。）

on:
  pull_request:
    branches: [main, yukako/main]
  push:
    branches: [main, yukako/main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check site identity matches branch
        run: node scripts/check-site-identity.mjs "${{ github.base_ref || github.ref_name }}"
